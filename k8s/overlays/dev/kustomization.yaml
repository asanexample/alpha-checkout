# dev (the default stage). Single replica. The image is NOT pinned here (ADR-071): the per-Product
# ApplicationSet injects the deployed digest from the control-plane Release record
# (gitops/releases/<team>/<product>/dev.yaml). CI never writes this repo's main; `placeholder` stays.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - cnp-allow-shop-authenticated.yaml # ADR-057 Phase 2: ingress from alpha-shop, mutual-auth required
  - netpol-egress-otel.yaml # P14: egress to the OTLP collector so checkout's spans export (join shop's trace)
replicas:
  - name: app-alpha-checkout
    count: 1
images:
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/checkout-web
    newTag: placeholder # the ApplicationSet injects the real digest from the Release record (ADR-071)
