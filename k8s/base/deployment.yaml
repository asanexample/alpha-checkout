apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-alpha-checkout
  labels:
    app: app-alpha-checkout
    app.kubernetes.io/name: app-alpha-checkout
    team: alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-alpha-checkout
  template:
    metadata:
      annotations:
        # P14 (ADR-077 D2): the OTel Operator injects OTEL_EXPORTER_OTLP_ENDPOINT (+ propagators/sampler)
        # from the namespace's `platform` Instrumentation CR, so checkout's SDK exports to the collector
        # without hardcoding the endpoint — this is what makes checkout's server span join shop's trace.
        instrumentation.opentelemetry.io/inject-sdk: "platform"
      labels:
        app: app-alpha-checkout
        app.kubernetes.io/name: app-alpha-checkout
        team: alpha
    spec:
      # Named SA — Pod Identity binds AWS creds here IF the Environment declares any (ADR-041). This starter
      # needs no AWS, but keeps the named SA so the wiring is ready (and never the `default` SA).
      serviceAccountName: app-alpha
      # App does not talk to the Kubernetes API — drop the SA token (least privilege). Required by the
      # platform Kyverno policy restrict-automount-sa-token (also auto-injected by mutate when absent).
      automountServiceAccountToken: false
      # Explicit hardened pod securityContext (defense-in-depth — the platform mutate would inject the
      # container-level bits, but a best-practice starter sets them outright). The image runs as a non-root
      # user (Dockerfile USER), so runAsNonRoot is satisfiable.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app-alpha-checkout
          # Product-scoped ECR image (v3: team-<team>/<product>-<service>). The :placeholder tag is the
          # pre-first-deploy seed; each overlay's `images:` pins the signed digest CI promotes per stage
          # (promote-by-PR, #377). restrict-images admits team-alpha/checkout-* (the product's repos).
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/checkout-web:placeholder
          ports:
            - containerPort: 8080
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # OpenTelemetry (ADR-077 Layer 1 / P14): the SDK opens a server span that joins alpha-shop's
            # distributed trace and exports to the platform collector. OTEL_EXPORTER_OTLP_ENDPOINT is injected
            # by the OTel Operator (the inject-sdk annotation above); egress to the collector is opened by the
            # allow-egress-to-otel-collector netpol in the dev overlay.
            - name: OTEL_SERVICE_NAME
              value: app-alpha-checkout
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=alpha-checkout
          securityContext:
            allowPrivilegeEscalation: false
            # Immutable container filesystem — writes go to the emptyDir /tmp below. Regulated-tier ready.
            # Rails writes to /rails/{tmp,log} at runtime, so the Ruby starter ships RW-root (tighten it with
            # emptyDir mounts at those paths if you need RO-root for a regulated tier).
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          # startupProbe gates liveness/readiness during boot, so a slow start (JVM/Rails warmup) never trips
          # the liveness probe (failureThreshold is language-tiered: 12 × 5s grace).
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # Writable scratch for a read-only root filesystem (the app/runtime's temp dir).
        - name: tmp
          emptyDir: {}
